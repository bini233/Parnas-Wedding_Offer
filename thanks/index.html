<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>주문서 제출 완료 | Parnas Hotel Collection</title>
  <meta name="robots" content="noindex" />
  <style>
    body{
      font-family:'Noto Sans KR',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      margin:0;padding:24px;background:#f7f7f7;display:flex;justify-content:center;
    }
    .wrap{
      width:100%;max-width:820px;background:#fff;border:1px solid #e9eef3;border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.06);padding:22px;
    }
    .logo{width:100%;border-radius:10px;overflow:hidden;margin-bottom:18px;border:1px solid #eef2f6;}
    .logo img{width:100%;height:auto;display:block;object-fit:contain;background:#fff;}
    h1{margin:0 0 10px;font-size:22px;color:#2c3e50;text-align:center;letter-spacing:-0.2px;}
    p{margin:0;color:#556677;line-height:1.7;text-align:center;}
    .box{
      margin-top:18px;padding:16px;background:#f7f9fb;border:1px solid #cfd6dd;border-radius:10px;
      color:#2c3e50;line-height:1.7;
    }
    .box a{color:inherit;text-decoration:underline;text-underline-offset:2px;}
    .foot{margin-top:14px;font-size:12px;color:#778899;text-align:center;}
  </style>
</head>
<body>
  <div class="wrap">

    <!-- (선택) 배너가 필요 없으면 이 블록 통째로 삭제해도 됨 -->
    <div class="logo">
      <img src="/images/banner.jpg" alt="Parnas Hotel Collection" />
    </div>

    <h1>주문서 제출이 완료되었습니다.</h1>
    <p>
      작성해주신 주문 내용을 확인 후, 안내드린 방식에 따라 결제 및 출고가 진행됩니다.<br/>
      문의사항은 아래 이메일로 연락 부탁드립니다.
    </p>

    <div class="box">
      <div><strong>문의</strong> : <a href="mailto:newbiz@parnas.co.kr">newbiz@parnas.co.kr</a></div>
      <div style="margin-top:6px;color:#556677;">
        • 카드결제: 입력하신 전화번호로 결제 링크를 발송드립니다.
      </div>
    </div>
  </div>
</body>
</html>
